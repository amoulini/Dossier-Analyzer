# Theme: warm paper + green accent (readable for long document sessions)
# Restart the app after changing this file.

[theme]
base = "light"

# Primary — selected row, main actions, focus ring (clear green, still legible with white label text)
primaryColor = "#15803d"

# Main canvas (warm off-white)
backgroundColor = "#faf7f2"

# Sidebar, cards, secondary buttons feel softer than pure white
secondaryBackgroundColor = "#ede8df"

# Body text (warm slate, not pure black)
textColor = "#334155"

# Links and inline accents harmonize with primary
linkColor = "#16a34a"

font = "sans serif"
